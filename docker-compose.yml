version: '3.8'

services:
  # 1. Laravel Application Server
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apotrack_server
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/postgres
    depends_on:
      - db
    networks:
      - apotrack_network

  # 2. PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: apotrack_db
    restart: unless-stopped
    ports:
      - "54322:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - apotrack_network

networks:
  apotrack_network:
    driver: bridge

volumes:
  pgdata:
